name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd eventmaster-api/backend
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run tests
      run: |
        cd eventmaster-api/backend
        pytest tests/ -v
      continue-on-error: true  # 測試還未建立，不阻塞

    - name: Lint with flake8
      run: |
        cd eventmaster-api/backend
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: |
        cd eventmaster-api
        docker build -t eventmaster-api:test ./backend

    - name: Run Docker container
      run: |
        cd eventmaster-api
        docker-compose up -d db redis
        sleep 10
        docker-compose up -d backend
        sleep 5

    - name: Test API
      run: |
        curl http://localhost:8000/health
        curl http://localhost:8000/api/v1/venues

    - name: Cleanup
      if: always()
      run: |
        cd eventmaster-api
        docker-compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        # TODO: 添加實際部署腳本
        # aws ecs update-service --cluster eventmaster --service api --force-new-deployment

name: Venue Data Validation

on:
  push:
    branches: [main, dev]
    paths:
      - 'venues.json'
      - 'auto_verification_engine.py'
      - 'quality_gate.py'
  pull_request:
    branches: [main, dev]
    paths:
      - 'venues.json'
      - 'auto_verification_engine.py'
      - 'quality_gate.py'

jobs:
  quality-gate:
    name: 品質閘門檢查
    runs-on: ubuntu-latest

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 執行品質閘門檢查
        run: |
          python quality_gate.py --all venues.json
        continue-on-error: false

      - name: 生成品質報告
        if: always()
        run: |
          python quality_gate.py --all venues.json --report quality_report.json

      - name: 上傳品質報告
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: quality-report
          path: quality_report.json
          retention-days: 30

      - name: 評論 PR（如果有）
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('quality_report.json', 'utf8'));
            } catch (e) {
              console.log('無法讀取報告');
              return;
            }

            const stats = report.stats;
            const passed = stats.passed || 0;
            const failed = stats.failed || 0;
            const total = stats.total || 0;

            let body = `## 📊 品質檢查報告\n\n`;
            body += `- ✅ 通過: ${passed}\n`;
            body += `- ❌ 失敗: ${failed}\n`;
            body += `- 📊 總計: ${total}\n\n`;

            if (failed > 0) {
              body += `### ⚠️ 發現問題\n\n`;
              body += `有 ${failed} 個場地未通過品質檢查，請檢查後再合併。\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  data-validation:
    name: 資料格式驗證
    runs-on: ubuntu-latest

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 驗證 JSON 格式
        run: |
          python -m json.tool venues.json > /dev/null && echo "✅ JSON 格式正確" || exit 1

      - name: 檢查必要欄位
        run: |
          python -c "
          import json
          import sys

          with open('venues.json', 'r', encoding='utf-8') as f:
              venues = json.load(f)

          required = ['id', 'name', 'venueType', 'city', 'address', 'contactPhone', 'url']
          errors = []

          for venue in venues:
              for field in required:
                  if field not in venue or not venue[field]:
                      errors.append(f'場地 {venue.get(\"id\", \"未知\")} 缺少 {field}')

          if errors:
              print('❌ 發現錯誤:')
              for error in errors[:10]:
                  print(f'  - {error}')
              if len(errors) > 10:
                  print(f'  ... 還有 {len(errors) - 10} 個錯誤')
              sys.exit(1)
          else:
              print('✅ 必要欄位檢查通過')
          "

      - name: 統計場地資料
        run: |
          python -c "
          import json

          with open('venues.json', 'r', encoding='utf-8') as f:
              venues = json.load(f)

          total = len(venues)
          with_rooms = sum(1 for v in venues if v.get('rooms'))
          total_rooms = sum(len(v.get('rooms', [])) for v in venues)

          print(f'📊 場地統計:')
          print(f'  總場地數: {total}')
          print(f'  有會議室: {with_rooms} ({with_rooms/total*100:.1f}%)')
          print(f'  總會議室數: {total_rooms}')
          "

  backup-check:
    name: 備份檔案檢查
    runs-on: ubuntu-latest

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 檢查備份檔案數量
        run: |
          backup_count=$(ls -1 venues.json.backup.* 2>/dev/null | wc -l)
          echo "📄 備份檔案數量: $backup_count"

          if [ $backup_count -gt 20 ]; then
            echo "⚠️  備份檔案過多 ($backup_count)，建議清理"
            echo "舊的備份檔案:"
            ls -lt venues.json.backup.* | tail -n +6
          fi

      - name: 列出最近的備份
        run: |
          echo "最近 5 個備份檔案:"
          ls -lt venues.json.backup.* 2>/dev/null | head -5 || echo "無備份檔案"

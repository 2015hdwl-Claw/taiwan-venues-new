<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="場地詳情 - 活動大師">
    <title>場地詳情 - 活動大師</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 頂部導航 -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="brand" onclick="goHome()">
                    <span class="brand-icon">🎉</span>
                    <h1 class="brand-title">活動大師</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-outline-light" onclick="goBack()">
                        ← 返回搜尋
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要內容 -->
    <main class="main venue-page">
        <div class="container">
            <!-- 載入中 -->
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <p>載入場地資料中...</p>
            </div>

            <!-- 錯誤狀態 -->
            <div class="empty-state" id="errorState" style="display: none;">
                <div class="empty-icon">⚠️</div>
                <h3>找不到場地資料</h3>
                <p>請確認場地 ID 是否正確</p>
                <button class="btn btn-primary" onclick="goHome()">返回首頁</button>
            </div>

            <!-- 場地詳情內容 -->
            <div id="venueContent" style="display: none;">
                <!-- 場地主圖與基本資訊 -->
                <section class="venue-hero">
                    <img id="venueMainImage" class="venue-hero-image" src="" alt="">
                    <div class="venue-hero-content">
                        <span id="venueType" class="venue-type"></span>
                        <h1 id="venueName" class="venue-title"></h1>
                        <div class="venue-meta">
                            <span id="venueAddress" class="venue-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span></span>
                            </span>
                        </div>
                    </div>
                </section>

                <!-- 場地相簿 -->
                <section class="venue-gallery-section" id="gallerySection" style="display: none;">
                    <h2 class="section-heading">📸 場地相簿</h2>
                    <div id="venueGallery" class="venue-gallery"></div>
                </section>

                <!-- 場地資訊區 -->
                <section class="venue-info-section">
                    <h2 class="section-heading">📋 場地資訊</h2>
                    <div class="venue-info-grid">
                        <div class="info-card">
                            <div class="info-icon">👥</div>
                            <div class="info-content">
                                <div class="info-label">容納人數</div>
                                <div id="venueCapacity" class="info-value">-</div>
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-icon">💰</div>
                            <div class="info-content">
                                <div class="info-label">價格區間</div>
                                <div id="venuePrice" class="info-value">-</div>
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-icon">🕐</div>
                            <div class="info-content">
                                <div class="info-label">可用時段</div>
                                <div id="venueTime" class="info-value">-</div>
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-icon">🎬</div>
                            <div class="info-content">
                                <div class="info-label">設備</div>
                                <div id="venueEquipment" class="info-value">-</div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 會議室列表 -->
                <section class="rooms-section">
                    <h2 class="section-heading">
                        🚪 會議室列表
                        <span id="roomsCount" class="rooms-count"></span>
                    </h2>
                    
                    <!-- 無會議室資料 -->
                    <div id="noRoomsState" class="empty-state" style="display: none;">
                        <div class="empty-icon">🚪</div>
                        <h3>尚無會議室資料</h3>
                        <p>此場地的會議室資訊尚未完善</p>
                    </div>

                    <!-- 會議室網格 -->
                    <div id="roomsGrid" class="rooms-grid"></div>
                </section>

                <!-- 聯絡資訊 -->
                <section class="contact-section">
                    <h2 class="section-heading">📞 聯絡資訊</h2>
                    <div class="contact-grid">
                        <div id="contactPerson" class="contact-item" style="display: none;">
                            <div class="contact-icon">👤</div>
                            <div class="contact-content">
                                <div class="contact-label">聯絡人</div>
                                <div class="contact-value"></div>
                            </div>
                        </div>
                        <div id="contactPhone" class="contact-item" style="display: none;">
                            <div class="contact-icon">📞</div>
                            <div class="contact-content">
                                <div class="contact-label">電話</div>
                                <a class="contact-value contact-link" href=""></a>
                            </div>
                        </div>
                        <div id="contactEmail" class="contact-item" style="display: none;">
                            <div class="contact-icon">✉️</div>
                            <div class="contact-content">
                                <div class="contact-label">Email</div>
                                <a class="contact-value contact-link" href=""></a>
                            </div>
                        </div>
                        <div id="venueUrl" class="contact-item" style="display: none;">
                            <div class="contact-icon">🌐</div>
                            <div class="contact-content">
                                <div class="contact-label">官方網站</div>
                                <a class="contact-value contact-link" href="" target="_blank" rel="noopener noreferrer">前往官網</a>
                            </div>
                        </div>
                    </div>
                    <div class="contact-actions">
                        <a id="callBtn" class="btn btn-primary" style="display: none;">
                            📞 撥打電話
                        </a>
                        <a id="websiteBtn" class="btn btn-outline" style="display: none;" target="_blank" rel="noopener noreferrer">
                            🌐 前往官網
                        </a>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 頁腳 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 活動大師 EventMaster. All rights reserved.</p>
            <p>專業的台灣活動場地查詢平台</p>
        </div>
    </footer>

    <script src="venue.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="場地詳情 - 活動大師">
    <title>場地詳情 - 活動大師</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat.css?v=20260406-v1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🎉</span>
                <span class="logo-text">活動大師</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">返回搜尋</a>
                <button class="btn btn-nav" onclick="window.toggleChat()">🤖 AI 助理</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="venue-main">
        <!-- Loading State -->
        <div class="loading" id="loadingState">
            <div class="spinner"></div>
            <p>載入場地資料中...</p>
        </div>

        <!-- Error State -->
        <div class="empty-state" id="errorState" style="display: none;">
            <div class="empty-icon">⚠️</div>
            <h3>找不到場地資料</h3>
            <p id="errorStateMessage">請確認場地 ID 是否正確</p>
            <a href="index.html" class="btn btn-primary">返回首頁</a>
        </div>

        <!-- Venue Content -->
        <div id="venueContent" style="display: none;">
            <!-- Hero Section -->
            <section class="venue-hero-section">
                <div class="venue-hero-container">
                    <div class="venue-hero-image">
                        <img id="venueMainImage" src="" alt="" style="display: none;">
                    </div>
                    <div class="venue-hero-info">
                        <span id="venueType" class="venue-type-badge"></span>
                        <h1 id="venueName" class="venue-hero-title"></h1>
                        <div class="venue-hero-meta">
                            <span id="venueAddress" class="venue-hero-address">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span></span>
                            </span>
                        </div>
                        <div class="venue-hero-actions">
                            <button class="btn btn-primary" onclick="window.toggleChat()">🤖 問 AI 助理</button>
                            <a id="websiteBtn" class="btn btn-outline" href="" target="_blank" style="display: none;">🌐 官網</a>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Quick Info Grid -->
            <section class="venue-section">
                <div class="section-container">
                    <div class="quick-info-grid">
                        <div class="quick-info-card">
                            <div class="quick-info-value" id="venueCapacity">-</div>
                            <div class="quick-info-label">最大容納</div>
                        </div>
                        <div class="quick-info-card">
                            <div class="quick-info-value" id="venuePrice">-</div>
                            <div class="quick-info-label">價格區間</div>
                        </div>
                        <div class="quick-info-card">
                            <div class="quick-info-value" id="venueEquipment">-</div>
                            <div class="quick-info-label">主要設備</div>
                        </div>
                        <div class="quick-info-card">
                            <div class="quick-info-value" id="venueTime">-</div>
                            <div class="quick-info-label">開放時段</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ⚠️ 風險評估 - 移到最前面 -->
            <section id="risksSection" class="venue-section risks-highlight" style="display: none;">
                <div class="section-container">
                    <h2 class="section-title">⚠️ 重要提醒</h2>
                    <div id="risksContent" class="knowledge-grid"></div>
                </div>
            </section>

            <!-- Gallery Section -->
            <section id="gallerySection" class="venue-section" style="display: none;">
                <div class="section-container">
                    <h2 class="section-title">📸 場地相簿</h2>
                    <div id="venueGallery" class="venue-gallery"></div>
                </div>
            </section>

            <!-- Rooms Section -->
            <section class="venue-section">
                <div class="section-container">
                    <div class="section-header">
                        <h2 class="section-title">會議室列表</h2>
                        <span id="roomsCount" class="result-count"></span>
                    </div>

                    <div id="noRoomsState" class="empty-state" style="display: none;">
                        <div class="empty-icon">🚪</div>
                        <h3>尚無會議室資料</h3>
                        <p>此場地的會議室資訊尚未完善</p>
                    </div>

                    <div id="roomsGrid" class="rooms-grid"></div>
                </div>
            </section>

            <!-- Rules Section -->
            <section id="rulesSection" class="venue-section" style="display: none;">
                <div class="section-container">
                    <h2 class="section-title">📋 租借規定</h2>
                    <div id="rulesContent" class="knowledge-grid"></div>
                </div>
            </section>

            <!-- Pricing Tips Section -->
            <section id="pricingTipsSection" class="venue-section" style="display: none;">
                <div class="section-container">
                    <h2 class="section-title">💡 省錢技巧</h2>
                    <div id="pricingTipsContent" class="tips-list"></div>
                </div>
            </section>

            <!-- Contact Section -->
            <section class="venue-section">
                <div class="section-container">
                    <h2 class="section-title">📞 聯絡資訊</h2>
                    <div class="contact-grid">
                        <div id="contactPerson" class="contact-card" style="display: none;">
                            <div class="contact-icon">👤</div>
                            <div class="contact-label">聯絡人</div>
                            <div class="contact-value"></div>
                        </div>
                        <div id="contactPhone" class="contact-card" style="display: none;">
                            <div class="contact-icon">📞</div>
                            <div class="contact-label">電話</div>
                            <a class="contact-value contact-link" href=""></a>
                        </div>
                        <div id="contactEmail" class="contact-card" style="display: none;">
                            <div class="contact-icon">✉️</div>
                            <div class="contact-label">Email</div>
                            <a class="contact-value contact-link" href=""></a>
                        </div>
                        <div id="venueUrl" class="contact-card" style="display: none;">
                            <div class="contact-icon">🌐</div>
                            <div class="contact-label">官方網站</div>
                            <a class="contact-value contact-link" href="" target="_blank">前往官網</a>
                        </div>
                    </div>
                </div>
            </section>

            <!-- AI CTA -->
            <section class="ai-cta">
                <div class="section-container">
                    <div class="ai-cta-content">
                        <h2 class="ai-cta-title">🤖 有問題問 AI</h2>
                        <p class="ai-cta-desc">不知道這個場地是否適合？讓 AI 幫你分析</p>
                        <button class="btn btn-primary btn-lg" onclick="window.toggleChat()">開始對話</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-main">
                <div class="footer-brand">
                    <span class="footer-logo">🎉</span>
                    <span class="footer-name">活動大師</span>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 活動大師 Activity Master. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="venue.js?v=20260408-v1"></script>
    <script src="chat.js?v=20260406-v1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const checkVenue = setInterval(function() {
                const venueId = window.currentVenueId;
                const venueName = window.currentVenueName;
                if (venueId && venueName && window.setVenueContext) {
                    window.setVenueContext(venueId, venueName);
                    clearInterval(checkVenue);
                }
            }, 500);
        });
    </script>
</body>
</html>
